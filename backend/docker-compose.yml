services:
  mysql:
    image: mysql:8.4
    container_name: school-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school_erp_clean
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
