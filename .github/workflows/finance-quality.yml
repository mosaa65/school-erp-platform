name: Finance Quality

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/finance-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/finance-quality.yml"
  workflow_dispatch:

jobs:
  backend-finance-e2e:
    name: Backend Finance E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: school_erp_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/school_erp_ci
      JWT_SECRET: finance-ci-secret
      JWT_EXPIRES_IN: 1d
      SWAGGER_PATH: api/docs
      STRICT_EMPLOYEE_WORKFLOW: "false"
      PAYMENT_WEBHOOK_SECRET: finance-ci-webhook-secret
      PAYMENT_WEBHOOK_IP_WHITELIST: ""
      FINANCE_SYSTEM_USER_ID: finance-ci-system-user
      RECURRING_JOURNAL_INTERVAL_MS: "900000"
      SEED_ADMIN_EMAIL: admin@school.local
      SEED_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Seed core data
        run: npm run prisma:seed:core

      - name: Run finance backend suites
        run: npm run test:e2e:finance

  frontend-finance-e2e:
    name: Frontend Finance E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run finance frontend tests
        env:
          CI: "true"
        run: npm run e2e:finance
